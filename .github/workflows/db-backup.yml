name: Database Backup

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      S3_BUCKET: ${{ secrets.S3_BUCKET }}
      S3_REGION: ${{ secrets.S3_REGION }}
      S3_ACCESS_KEY: ${{ secrets.S3_ACCESS_KEY }}
      S3_SECRET_KEY: ${{ secrets.S3_SECRET_KEY }}
      S3_ENDPOINT: ${{ secrets.S3_ENDPOINT }}
      BACKUP_S3_PREFIX: backups/db
    steps:
      - name: Skip when DATABASE_URL is not configured
        if: env.DATABASE_URL == ''
        run: echo "Add DATABASE_URL to GitHub Secrets to enable cloud backups."

      - uses: actions/checkout@v4
        if: env.DATABASE_URL != ''

      - uses: actions/setup-node@v4
        if: env.DATABASE_URL != ''
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install PostgreSQL client
        if: env.DATABASE_URL != ''
        run: sudo apt-get update && sudo apt-get install -y postgresql-client gzip

      - name: Run database backup
        if: env.DATABASE_URL != ''
        working-directory: backend
        run: npm ci --omit=dev && npm run backup
