version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: rare-vet-lims-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-lims_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-lims_password}
      POSTGRES_DB: ${DB_NAME:-rare_vet_lims}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/migrations/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-lims_user} -d ${DB_NAME:-rare_vet_lims}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rare-vet-lims-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 5000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-lims_user}
      DB_PASSWORD: ${DB_PASSWORD:-lims_password}
      DB_NAME: ${DB_NAME:-rare_vet_lims}
      JWT_SECRET: ${JWT_SECRET:-change-this-in-production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-24h}
      STORAGE_TYPE: ${STORAGE_TYPE:-local}
      STORAGE_PATH: /app/uploads
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173}
    ports:
      - "${API_PORT:-5000}:5000"
    volumes:
      - uploads_data:/app/uploads

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
    container_name: rare-vet-lims-web
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${WEB_PORT:-5173}:80"

volumes:
  postgres_data:
  uploads_data:
