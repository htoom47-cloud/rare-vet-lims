# Render Blueprint — https://render.com/docs/blueprint-spec
# One web service serves staff + portal (by custom domain / host header).

databases:
  - name: rare-vet-db
    databaseName: rare_vet_lims
    plan: basic-256mb

services:
  - type: web
    name: rare-vet-lims
    runtime: node
    plan: starter
    region: frankfurt
    repo: https://github.com/htoom47-cloud/rare-vet-lims
    branch: main
    buildCommand: npm run build:cloud
    startCommand: npm run start:cloud
    healthCheckPath: /api/health
    # Pin Node 20 LTS for consistent native deps (canvas/sharp) on Linux builds.
    disk:
      name: lims-uploads
      mountPath: /var/data
      sizeGB: 5
    domains:
      - lims.rarevetcare.com
      - portal.rarevetcare.com
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: NODE_ENV
        value: production
      - key: SERVE_FRONTEND
        value: true
      - key: RUN_SEED
        value: false
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_EMAIL
        value: admin@rarevetcare.com
      - key: ADMIN_INITIAL_PASSWORD
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 24h
      - key: STORAGE_TYPE
        value: local
      - key: STORAGE_PATH
        value: /var/data/uploads
      - key: S3_BUCKET
        sync: false
      - key: S3_REGION
        sync: false
      - key: S3_ACCESS_KEY
        sync: false
      - key: S3_SECRET_KEY
        sync: false
      - key: S3_ENDPOINT
        sync: false
      - key: LAB_NAME
        value: AL NAWADER VETERINARY CARE CENTER
      - key: LAB_NAME_AR
        value: مركز رعاية النوادر البيطري
      - key: LAB_SUBTITLE
        value: Veterinary Medical & Research Laboratory
      - key: LAB_SUBTITLE_AR
        value: للتحاليل البيطرية والبحثية
      - key: LAB_PHONE
        value: "0115007257"
      - key: LAB_EMAIL
        value: alnwader.10hz@gmail.com
      - key: VAT_NUMBER
        value: "311042487300003"
      - key: NOTIFICATION_PROVIDER
        value: msegat
      - key: SMS_ENABLED
        value: "false"
      - key: MSEGAT_USERNAME
        sync: false
      - key: MSEGAT_API_KEY
        sync: false
      - key: MSEGAT_SENDER
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: rare-vet-db
          property: connectionString
      - key: APP_URL
        value: https://lims.rarevetcare.com
      - key: STAFF_APP_URL
        value: https://lims.rarevetcare.com
      - key: PORTAL_APP_URL
        value: https://portal.rarevetcare.com
      - key: PORTAL_HOSTS
        value: portal.rarevetcare.com
      - key: CORS_ORIGINS
        value: https://lims.rarevetcare.com,https://portal.rarevetcare.com,https://rare-vet-lims.onrender.com
      - key: REPORT_DESIGN
        value: "3"
      - key: PUPPETEER_CACHE_DIR
        value: /opt/render/project/src/backend/.cache/puppeteer
      - key: PORTAL_JWT_EXPIRES_IN
        value: 7d
      - key: PORTAL_OTP_STATIC
        value: "off"

  - type: cron
    name: rare-vet-db-backup
    runtime: docker
    dockerfilePath: ./backend/Dockerfile.backup
    dockerContext: ./backend
    plan: starter
    region: frankfurt
    repo: https://github.com/htoom47-cloud/rare-vet-lims
    branch: main
    schedule: "0 3 * * *"
    envVars:
      - key: NODE_ENV
        value: production
      - key: BACKUP_DIR
        value: /tmp/backups
      - key: BACKUP_RETENTION_DAYS
        value: "7"
      - key: BACKUP_S3_PREFIX
        value: backups/db
      - key: DATABASE_URL
        fromDatabase:
          name: rare-vet-db
          property: connectionString
      - key: S3_BUCKET
        sync: false
      - key: S3_REGION
        sync: false
      - key: S3_ACCESS_KEY
        sync: false
      - key: S3_SECRET_KEY
        sync: false
      - key: S3_ENDPOINT
        sync: false
