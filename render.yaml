# Render Blueprint — https://render.com/docs/blueprint-spec
# One web service serves staff + portal (by custom domain / host header).

databases:
  - name: rare-vet-db
    databaseName: rare_vet_lims
    plan: basic-256mb

services:
  - type: web
    name: rare-vet-lims
    runtime: node
    plan: starter
    region: frankfurt
    repo: https://github.com/htoom47-cloud/rare-vet-lims
    branch: main
    buildCommand: npm run build:cloud
    startCommand: npm run start:cloud
    healthCheckPath: /api/health
    domains:
      - lims.rarevetcare.com
      - portal.rarevetcare.com
    envVars:
      - key: NODE_ENV
        value: production
      - key: SERVE_FRONTEND
        value: true
      - key: RUN_SEED
        value: false
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_EMAIL
        value: admin@rarevetcare.com
      - key: ADMIN_INITIAL_PASSWORD
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 24h
      - key: STORAGE_TYPE
        value: local
      - key: STORAGE_PATH
        value: ./uploads
      - key: LAB_NAME
        value: Rare Animals Veterinary Care Center
      - key: LAB_NAME_AR
        value: مركز رعاية النوادر البيطري
      - key: LAB_SUBTITLE
        value: Veterinary Medical & Research Laboratory
      - key: LAB_SUBTITLE_AR
        value: للتحاليل البيطرية والبحثية
      - key: LAB_PHONE
        value: "0115007257"
      - key: LAB_EMAIL
        value: alnwader.10hz@gmail.com
      - key: VAT_NUMBER
        value: "311042487300003"
      - key: DATABASE_URL
        fromDatabase:
          name: rare-vet-db
          property: connectionString
      - key: APP_URL
        value: https://lims.rarevetcare.com
      - key: STAFF_APP_URL
        value: https://lims.rarevetcare.com
      - key: PORTAL_APP_URL
        value: https://portal.rarevetcare.com
      - key: PORTAL_HOSTS
        value: portal.rarevetcare.com
      - key: CORS_ORIGINS
        value: https://lims.rarevetcare.com,https://portal.rarevetcare.com,https://rare-vet-lims.onrender.com
      - key: PORTAL_JWT_EXPIRES_IN
        value: 48h
      - key: PORTAL_OTP_STATIC
        value: "1234"
