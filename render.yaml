# Render Blueprint — https://render.com/docs/blueprint-spec
# Deploy: connect GitHub repo → New Blueprint → select this file

databases:
  - name: rare-vet-db
    databaseName: rare_vet_lims
    plan: basic-256mb

services:
  - type: web
    name: rare-vet-lims
    runtime: node
    plan: starter
    region: frankfurt
    buildCommand: npm run build:cloud
    startCommand: npm run start:cloud
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: SERVE_FRONTEND
        value: true
      - key: RUN_SEED
        value: false
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_EMAIL
        value: admin@rarevetcare.com
      - key: ADMIN_INITIAL_PASSWORD
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 24h
      - key: STORAGE_TYPE
        value: local
      - key: STORAGE_PATH
        value: ./uploads
      # Uncomment after creating S3/R2 bucket (production PDF storage):
      # - key: STORAGE_TYPE
      #   value: s3
      # - key: S3_BUCKET
      #   sync: false
      # - key: S3_REGION
      #   value: me-south-1
      # - key: S3_ACCESS_KEY
      #   sync: false
      # - key: S3_SECRET_KEY
      #   sync: false
      - key: LAB_NAME
        value: Rare Animals Veterinary Care Center
      - key: LAB_NAME_AR
        value: مركز رعاية النوادر البيطري
      - key: LAB_SUBTITLE
        value: Veterinary Medical & Research Laboratory
      - key: LAB_SUBTITLE_AR
        value: للتحاليل البيطرية والبحثية
      - key: LAB_PHONE
        value: +966539779328
      - key: LAB_EMAIL
        value: alnwader.10hz@gmail.com
      - key: DATABASE_URL
        fromDatabase:
          name: rare-vet-db
          property: connectionString
      # Official URLs — update after attaching custom domains in Render:
      - key: STAFF_APP_URL
        value: https://lims.rarevetcare.com
      - key: PORTAL_APP_URL
        value: https://portal.rarevetcare.com
      - key: CORS_ORIGINS
        value: https://lims.rarevetcare.com,https://portal.rarevetcare.com,https://rare-vet-lims.onrender.com,https://rare-vet-portal.onrender.com
      - key: PORTAL_JWT_EXPIRES_IN
        value: 48h

  - type: web
    name: rare-vet-portal
    runtime: static
    buildCommand: cd frontend-portal && npm ci --include=dev && VITE_API_URL=https://rare-vet-lims.onrender.com/api npm run build
    staticPublishPath: frontend-portal/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
