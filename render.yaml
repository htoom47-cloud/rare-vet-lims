# Render Blueprint — https://render.com/docs/blueprint-spec
# Deploy: connect GitHub repo → New Blueprint → select this file

databases:
  - name: rare-vet-db
    databaseName: rare_vet_lims
    plan: basic-256mb

services:
  - type: web
    name: rare-vet-lims
    runtime: node
    plan: starter
    region: frankfurt
    buildCommand: npm run build:cloud
    startCommand: npm run start:cloud
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: SERVE_FRONTEND
        value: true
      - key: RUN_SEED
        value: false
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_EMAIL
        value: admin@rarevetcare.com
      - key: ADMIN_INITIAL_PASSWORD
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 24h
      - key: STORAGE_TYPE
        value: local
      - key: STORAGE_PATH
        value: ./uploads
      - key: LAB_NAME
        value: Rare Animals Veterinary Care Center
      - key: LAB_NAME_AR
        value: مركز رعاية النوادر البيطري
      - key: LAB_SUBTITLE
        value: Veterinary Medical & Research Laboratory
      - key: LAB_SUBTITLE_AR
        value: للتحاليل البيطرية والبحثية
      - key: LAB_PHONE
        value: +966539779328
      - key: LAB_EMAIL
        value: alnwader.10hz@gmail.com
      - key: DATABASE_URL
        fromDatabase:
          name: rare-vet-db
          property: connectionString
